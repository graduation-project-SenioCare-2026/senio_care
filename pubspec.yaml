name: senio_care
description: "A new Flutter project."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8
  firebase_core: ^4.2.1
  flutter_native_splash:
  flutter_launcher_icons:
  device_preview: ^1.3.1
  google_fonts: ^6.3.1
  lottie:
  injectable:
  get_it:
  dio: ^5.9.0
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.5.3
  provider: ^6.1.2
  retrofit: ^4.7.2
  json_annotation: ^4.9.0
  dio_cache_interceptor: ^4.0.3
  bloc: ^9.0.0
  flutter_bloc: ^9.1.1
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  loading_animation_widget: ^1.3.0
  flutter_secure_storage: ^9.2.2
  equatable:
  mockito: ^5.4.4
  connectivity_plus: ^7.0.0
  animate_do: ^4.2.0
  flutter_svg: ^2.2.1
  skeletonizer: ^2.1.0+1
  shimmer_animation: ^2.2.2
  cached_network_image: ^3.4.1
  youtube_player_flutter: ^9.1.3
  cloud_firestore: ^6.0.3
  image_picker: ^1.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation tools
  injectable_generator: ^2.5.0
  build_runner: ^2.4.13
  json_serializable: ^6.7.1
  retrofit_generator: ^8.1.0

flutter:

  uses-material-design: true
  generate: true

  # To add assets to your application, add an assets section, like this:
  assets:
     - assets/images/
     - assets/icons/

  fonts:
     - family: Amaranth
       fonts:
         - asset: assets/fonts/Amaranth/Amaranth-Bold.ttf
           weight: 700
         - asset: assets/fonts/Amaranth/Amaranth-Regular.ttf
           weight: 400


